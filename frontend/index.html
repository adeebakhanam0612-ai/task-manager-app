<!DOCTYPE html>
<html>
<head>
  <title>Task Manager</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      margin-top: 50px;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 350px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
    }

    input {
      width: 70%;
      padding: 8px;
    }

    button {
      padding: 8px;
      margin-left: 5px;
      cursor: pointer;
    }

    li {
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
    }

    .delete {
      background: red;
      color: white;
      border: none;
    }

    .edit {
      background: orange;
      color: white;
      border: none;
      margin-right: 5px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Task Manager</h1>

    <input type="text" id="taskInput" placeholder="Enter task">
    <button onclick="addTask()">Add</button>

    <ul id="taskList"></ul>
  </div>

  <script>
    const API_URL = "http://localhost:5000/tasks";

    async function loadTasks() {
      const res = await fetch(API_URL);
      const tasks = await res.json();

      const list = document.getElementById("taskList");
      list.innerHTML = "";

      tasks.forEach((task, index) => {
        const li = document.createElement("li");
        li.innerHTML = `
          ${task}
          <div>
            <button class="edit" onclick="editTask(${index}, '${task}')">Edit</button>
            <button class="delete" onclick="deleteTask(${index})">Delete</button>
          </div>
        `;
        list.appendChild(li);
      });
    }

    async function addTask() {
      const input = document.getElementById("taskInput");
      const task = input.value.trim();

      if (!task) return;

      await fetch(API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ task })
      });

      input.value = "";
      loadTasks();
    }

    async function deleteTask(index) {
      await fetch(`${API_URL}/${index}`, {
        method: "DELETE"
      });
      loadTasks();
    }

    async function editTask(index, oldTask) {
      const newTask = prompt("Edit task:", oldTask);

      if (!newTask) return;

      await fetch(`${API_URL}/${index}`, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ task: newTask })
      });

      loadTasks();
    }

    loadTasks();
  </script>
</body>
</html>
